<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellCast – Parent Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-page">
  <header class="admin-header">
    <div class="admin-logo">🪄 SpellCast</div>
    <div class="admin-nav">
      <button onclick="showTab('words')" class="tab-btn active" id="tab-words">This Week's Words</button>
      <button onclick="showTab('history')" class="tab-btn" id="tab-history">Grade History</button>
      <button onclick="showTab('settings')" class="tab-btn" id="tab-settings">Settings</button>
      <a href="/admin/logout" class="logout-btn">Logout</a>
    </div>
  </header>

  <div class="admin-container">

    <!-- TAB: Words -->
    <div id="tab-content-words" class="tab-content">
      <h2>This Week's Spelling Words</h2>
      <p>Enter up to 20 words for this week's spelling practice.</p>

      <div class="week-form-card">
        <div class="form-row">
          <label>Week Label</label>
          <input type="text" id="week-label" placeholder="e.g. Week of May 5" class="admin-input">
        </div>

        <div class="words-grid" id="words-grid">
          <!-- 20 word inputs generated by JS -->
        </div>

        <button onclick="saveWords()" class="btn btn-admin-save">💾 Save This Week's Words</button>
        <div id="save-message" class="save-message hidden"></div>
      </div>

      <div class="current-list-card" id="current-list-card" style="display:none">
        <h3>📋 Current Active List</h3>
        <div id="current-list-words" class="current-words-display"></div>
        <div class="miss-legend">
          <span class="miss-0">✅ No misses</span>
          <span class="miss-1">🟡 Missed 1-2x</span>
          <span class="miss-3">🔴 Missed 3+ times</span>
        </div>
      </div>
    </div>

    <!-- TAB: History -->
    <div id="tab-content-history" class="tab-content hidden">
      <h2>Grade History</h2>
      <div id="history-list" class="history-list">Loading...</div>
    </div>

    <!-- TAB: Settings -->
    <div id="tab-content-settings" class="tab-content hidden">
      <h2>Settings</h2>
      <div class="settings-card">
        <div class="form-row">
          <label>Child's Name</label>
          <input type="text" id="setting-name" class="admin-input" placeholder="Child's name">
        </div>
        <div class="form-row">
          <label>Admin PIN</label>
          <input type="password" id="setting-pin" class="admin-input" placeholder="New PIN">
        </div>
        <div class="form-row">
          <label>Theme Color</label>
          <select id="setting-theme" class="admin-input">
            <option value="purple">🟣 Purple Magic</option>
            <option value="blue">🔵 Ocean Blue</option>
            <option value="green">🟢 Forest Green</option>
            <option value="pink">🩷 Bubblegum Pink</option>
          </select>
        </div>
        <button onclick="saveSettings()" class="btn btn-admin-save">💾 Save Settings</button>
        <div id="settings-message" class="save-message hidden"></div>
      </div>
      <div class="preview-link">
        <a href="/" target="_blank" class="btn btn-practice">Preview Child View 🪄</a>
      </div>
    </div>

  </div>

  <script>
    // Build 20 word inputs
    const grid = document.getElementById('words-grid');
    for (let i = 1; i <= 20; i++) {
      const div = document.createElement('div');
      div.className = 'word-input-wrap';
      div.innerHTML = `<span class="word-num">${i}.</span>
        <input type="text" class="word-input" id="word-${i}" 
               placeholder="Word ${i}" autocomplete="off" autocorrect="off"
               autocapitalize="none" spellcheck="false">`;
      grid.appendChild(div);
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-content-' + tab).classList.remove('hidden');
      document.getElementById('tab-' + tab).classList.add('active');
      if (tab === 'history') loadHistory();
      if (tab === 'settings') loadSettings();
      if (tab === 'words') loadCurrentList();
    }

    async function saveWords() {
      const weekLabel = document.getElementById('week-label').value.trim();
      if (!weekLabel) { alert('Please enter a week label!'); return; }
      const words = [];
      for (let i = 1; i <= 20; i++) {
        const val = document.getElementById('word-' + i).value.trim();
        if (val) words.push(val);
      }
      if (words.length === 0) { alert('Please enter at least one word!'); return; }

      const res = await fetch('/api/lists', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ week_label: weekLabel, words })
      });
      const data = await res.json();

      const msg = document.getElementById('save-message');
      if (data.success) {
        msg.className = 'save-message success';
        msg.textContent = `✅ Saved ${words.length} words for "${weekLabel}"!`;
        loadCurrentList();
      } else {
        msg.className = 'save-message error';
        msg.textContent = '❌ Error saving words.';
      }
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    async function loadCurrentList() {
      const res = await fetch('/api/active-list');
      const list = await res.json();
      if (!list) return;

      const card = document.getElementById('current-list-card');
      card.style.display = 'block';
      const container = document.getElementById('current-list-words');
      container.innerHTML = `<p class="active-week-label">📅 ${list.week_label}</p>`;

      const grid = document.createElement('div');
      grid.className = 'active-words-grid';
      for (const w of list.words) {
        const div = document.createElement('div');
        const missClass = w.miss_count >= 3 ? 'miss-high' : w.miss_count >= 1 ? 'miss-mid' : 'miss-none';
        div.className = 'active-word-chip ' + missClass;
        div.innerHTML = `<strong>${w.word}</strong>${w.miss_count > 0 ? `<span class="miss-badge">${w.miss_count}x</span>` : ''}`;
        grid.appendChild(div);
      }
      container.appendChild(grid);
    }

    async function loadHistory() {
      const res = await fetch('/api/results');
      const results = await res.json();
      const list = document.getElementById('history-list');

      if (!results.length) {
        list.innerHTML = '<p class="empty-msg">No tests taken yet. Start practicing! ✨</p>';
        return;
      }

      list.innerHTML = '';
      for (const r of results) {
        const div = document.createElement('div');
        div.className = 'history-item';
        const grade = r.score >= 90 ? 'A' : r.score >= 80 ? 'B' : r.score >= 70 ? 'C' : r.score >= 60 ? 'D' : 'F';
        const gradeClass = r.score >= 80 ? 'grade-good' : r.score >= 70 ? 'grade-ok' : 'grade-low';
        const date = new Date(r.taken_at).toLocaleDateString();
        div.innerHTML = `
          <div class="history-week">${r.week_label}</div>
          <div class="history-date">${date}</div>
          <div class="history-score">${r.correct || '?'}/${r.total} words correct</div>
          <div class="history-grade ${gradeClass}">${grade} (${r.score}%)</div>
        `;
        list.appendChild(div);
      }
    }

    async function loadSettings() {
      const res = await fetch('/api/settings');
      const s = await res.json();
      document.getElementById('setting-name').value = s.child_name || '';
      document.getElementById('setting-theme').value = s.app_theme || 'purple';
    }

    async function saveSettings() {
      const res = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          child_name: document.getElementById('setting-name').value,
          admin_pin: document.getElementById('setting-pin').value || undefined,
          app_theme: document.getElementById('setting-theme').value
        })
      });
      const data = await res.json();
      const msg = document.getElementById('settings-message');
      msg.className = 'save-message ' + (data.success ? 'success' : 'error');
      msg.textContent = data.success ? '✅ Settings saved!' : '❌ Error saving settings.';
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    loadCurrentList();
  </script>
</body>
</html>
