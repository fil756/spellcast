<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellCast 🪄</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page" data-theme="purple">
  <div class="stars"></div>
  <div class="home-container">
    <div class="logo-area">
      <div class="magic-wand">🪄</div>
      <h1 class="app-title">SpellCast</h1>
      <p class="subtitle">Magic Spelling Practice</p>
    </div>

    <!-- Child selector -->
    <div id="child-select-area" class="hidden">
      <p class="who-prompt" id="who-prompt">Who's spelling today?</p>
      <div id="child-cards" class="child-cards"></div>
    </div>

    <!-- Single child or after selection -->
    <div id="play-area" class="hidden">
      <div id="greeting" class="greeting"></div>
      <div id="week-label" class="week-label"></div>
      <button class="switch-child-btn" id="switch-btn" onclick="switchChild()" style="display:none">✏️ Not you?</button>
      <div class="home-buttons">
        <a id="practice-link" href="/practice" class="btn btn-practice">
          <span class="btn-icon">✨</span>
          Practice Spells
          <span class="btn-sub">Learn your words</span>
        </a>
        <a id="test-link" href="/test" class="btn btn-test">
          <span class="btn-icon">⭐</span>
          Spelling Quest
          <span class="btn-sub">Take the test!</span>
        </a>
      </div>
    </div>

    <div id="no-words" class="hidden no-words-msg">
      <p>⏳ Waiting for spelling words!</p>
      <p class="small">Ask your parent to add this week's words.</p>
    </div>

    <div class="admin-link-area">
      <a href="/admin" class="admin-link">Parent Dashboard</a>
      &nbsp;·&nbsp;
      <a href="/teacher" class="admin-link">Teacher Portal</a>
    </div>
  </div>

  <script>
    let selectedChildId = localStorage.getItem('spellcast_child_id');

    async function init() {
      const res = await fetch('/api/children');
      const children = await res.json();
      allChildren = children;

      if (children.length === 0) {
        document.getElementById('no-words').classList.remove('hidden');
        return;
      }

      // Build child cards (always, for switching later)
      const cards = document.getElementById('child-cards');
      cards.innerHTML = '';
      for (const child of children) {
        const btn = document.createElement('button');
        btn.className = 'child-card';
        btn.innerHTML = `<div class="child-avatar">${child.avatar}</div><div class="child-name">${child.name}</div>`;
        btn.onclick = () => selectChild(child.id, children);
        cards.appendChild(btn);
      }

      // Check remembered child
      const remembered = children.find(c => c.id == selectedChildId);
      if (remembered) {
        selectChild(remembered.id, children);
      } else {
        if (children.length === 1) {
          document.getElementById('who-prompt').textContent = 'Tap to start spelling! ✨';
        }
        document.getElementById('child-select-area').classList.remove('hidden');
      }
    }

    let allChildren = [];

    function switchChild() {
      localStorage.removeItem('spellcast_child_id');
      document.getElementById('play-area').classList.add('hidden');
      document.getElementById('no-words').classList.add('hidden');
      document.body.dataset.theme = 'purple';
      const area = document.getElementById('child-select-area');
      area.classList.remove('hidden');
    }

    async function selectChild(childId, children) {
      localStorage.setItem('spellcast_child_id', childId);
      const child = (children || allChildren).find(c => c.id == childId) || null;

      document.getElementById('child-select-area').classList.add('hidden');

      const res = await fetch(`/api/child/${childId}/active-list`);
      const list = await res.json();

      document.body.dataset.theme = (child || list?.child)?.theme || 'purple';

      const name = child?.name || list?.child?.name || 'Spellcaster';
      document.getElementById('greeting').textContent = `Hi, ${name}! 🌟`;
      // Show switch button only if multiple kids
      if (allChildren.length > 1) document.getElementById('switch-btn').style.display = 'inline-block';

      if (!list) {
        document.getElementById('no-words').classList.remove('hidden');
        return;
      }

      document.getElementById('week-label').textContent = `This week: ${list.week_label}`;
      document.getElementById('practice-link').href = `/practice?child=${childId}`;
      document.getElementById('test-link').href = `/test?child=${childId}`;
      document.getElementById('play-area').classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
