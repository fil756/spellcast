<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellCast 🪄</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page" data-theme="purple">
  <div class="stars"></div>
  <div class="home-container">
    <div class="logo-area">
      <div class="magic-wand">🪄</div>
      <h1 class="app-title">SpellCast</h1>
      <p class="subtitle">Magic Spelling Practice</p>
    </div>

    <!-- Child selector -->
    <div id="child-select-area" class="hidden">
      <p class="who-prompt" id="who-prompt">Who's spelling today?</p>
      <div id="child-cards" class="child-cards"></div>
    </div>

    <!-- Single child or after selection -->
    <div id="play-area" class="hidden">
      <div id="greeting" class="greeting"></div>
      <div id="week-label" class="week-label"></div>
      <button class="switch-child-btn" id="switch-btn" onclick="switchChild()" style="display:none">✏️ Not you?</button>
      <div class="home-buttons">
        <a id="practice-link" href="/practice" class="btn btn-practice">
          <span class="btn-icon">✨</span>
          Practice Spells
          <span class="btn-sub">Learn your words</span>
        </a>
        <a id="test-link" href="/test" class="btn btn-test">
          <span class="btn-icon">⭐</span>
          Spelling Quest
          <span class="btn-sub">Take the test!</span>
        </a>
      </div>
    </div>

    <div id="no-words" class="hidden no-words-msg">
      <p>⏳ Waiting for spelling words!</p>
      <p class="small">Ask your parent to add this week's words.</p>
    </div>

    <div class="admin-link-area">
      <a href="/admin" class="admin-link">Parent Dashboard</a>
      &nbsp;·&nbsp;
      <a href="/teacher" class="admin-link">Teacher Portal</a>
    </div>
  </div>

  <script>
    async function init() {
      // Check if user is logged in with a session
      const sessionRes = await fetch('/api/session-child');
      if (sessionRes.status === 401) {
        // Not logged in, redirect to login
        window.location.href = '/login';
        return;
      }

      const session = await sessionRes.json();
      const childId = session.childId;

      // Load and display the selected child
      const res = await fetch(`/api/child/${childId}/active-list`);
      const list = await res.json();
      const child = list?.child || { name: 'Spellcaster', theme: 'purple', id: childId };

      document.body.dataset.theme = child.theme || 'purple';

      document.getElementById('greeting').textContent = `Hi, ${child.name}! 🌟`;
      
      // Check if multiple children, show switch button
      const childrenRes = await fetch(`/api/parent-children`);
      if (childrenRes.ok) {
        const children = await childrenRes.json();
        if (children.length > 1) {
          document.getElementById('switch-btn').style.display = 'inline-block';
        }
      }

      if (!list) {
        document.getElementById('no-words').classList.remove('hidden');
        return;
      }

      document.getElementById('week-label').textContent = `This week: ${list.week_label}`;
      document.getElementById('practice-link').href = `/practice`;
      document.getElementById('test-link').href = `/test`;
      document.getElementById('play-area').classList.remove('hidden');
    }

    function switchChild() {
      // Logout and go back to login to select new child
      fetch('/api/logout', { method: 'POST' }).then(() => {
        window.location.href = '/login';
      });
    }

    init();
  </script>
</body>
</html>
