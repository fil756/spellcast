<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellCast 🪄</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page" data-theme="purple">
  <div class="stars"></div>
  <div class="home-container">
    <div class="logo-area">
      <div class="magic-wand">🪄</div>
      <h1 class="app-title">SpellCast</h1>
      <p class="subtitle">Magic Spelling Practice</p>
    </div>

    <!-- Child selector — always visible, no auth needed -->
    <div id="child-select-area">
      <p class="who-prompt">Who's spelling today?</p>
      <div id="child-cards" class="child-cards"></div>
    </div>

    <!-- After child selected -->
    <div id="play-area" class="hidden">
      <div id="greeting" class="greeting"></div>
      <div id="week-label" class="week-label"></div>
      <button class="switch-child-btn" id="switch-btn" onclick="switchChild()">✏️ Not you?</button>
      <div class="home-buttons">
        <a id="practice-link" href="/practice" class="btn btn-practice">
          <span class="btn-icon">✨</span>
          Practice Spells
          <span class="btn-sub">Learn your words</span>
        </a>
        <a id="test-link" href="/test" class="btn btn-test">
          <span class="btn-icon">⭐</span>
          Spelling Quest
          <span class="btn-sub">Take the test!</span>
        </a>
      </div>
    </div>

    <div id="no-words" class="hidden no-words-msg">
      <p>⏳ Waiting for spelling words!</p>
      <p class="small">Ask your parent to add this week's words.</p>
    </div>

    <div class="admin-link-area">
      <a href="/admin" class="admin-link">Parent Dashboard</a>
      &nbsp;·&nbsp;
      <a href="/teacher" class="admin-link">Teacher Portal</a>
    </div>
  </div>

  <script>
    let allChildren = [];
    let selectedChildId = localStorage.getItem('spellcast_child_id');

    async function init() {
      const res = await fetch('/api/children');
      allChildren = await res.json();

      if (allChildren.length === 0) {
        document.getElementById('child-select-area').style.display = 'none';
        document.getElementById('no-words').classList.remove('hidden');
        return;
      }

      const cards = document.getElementById('child-cards');
      cards.innerHTML = allChildren.map(child => `
        <button class="child-card" data-theme="${child.theme}" onclick="selectChild(${child.id})">
          <div class="child-avatar">${child.avatar}</div>
          <div class="child-name">${child.name}</div>
        </button>
      `).join('');

      // Auto-select remembered child
      const remembered = allChildren.find(c => c.id == selectedChildId);
      if (remembered) {
        selectChild(remembered.id);
      } else if (allChildren.length === 1) {
        selectChild(allChildren[0].id);
      }
    }

    async function selectChild(childId) {
      const child = allChildren.find(c => c.id === childId);
      if (!child) return;

      localStorage.setItem('spellcast_child_id', childId);
      selectedChildId = childId;

      document.body.dataset.theme = child.theme || 'purple';
      document.getElementById('child-select-area').classList.add('hidden');
      document.getElementById('greeting').textContent = `Hi, ${child.name}! 🌟`;

      const res = await fetch(`/api/child/${childId}/active-list`);
      const list = await res.json();

      if (!list) {
        document.getElementById('no-words').classList.remove('hidden');
        document.getElementById('play-area').classList.remove('hidden');
        return;
      }

      document.getElementById('week-label').textContent = `This week: ${list.week_label}`;
      document.getElementById('practice-link').href = `/practice?child=${childId}`;
      document.getElementById('test-link').href = `/test?child=${childId}`;
      document.getElementById('play-area').classList.remove('hidden');
    }

    function switchChild() {
      localStorage.removeItem('spellcast_child_id');
      document.getElementById('play-area').classList.add('hidden');
      document.getElementById('no-words').classList.add('hidden');
      document.getElementById('child-select-area').classList.remove('hidden');
      document.body.dataset.theme = 'purple';
    }

    init();
  </script>
</body>
</html>
