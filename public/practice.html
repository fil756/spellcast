<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellCast – Practice ✨</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="practice-page">
  <div class="stars"></div>
  <header class="game-header">
    <a href="/" class="back-btn">← Home</a>
    <div class="header-title">✨ Practice Spells</div>
    <div class="streak-display">🔥 <span id="streak">0</span></div>
  </header>
  <div class="game-container">
    <div id="loading" class="loading-message">Loading your spell words... 🪄</div>
    <div id="practice-area" class="hidden">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="word-counter" id="word-counter"></div>
      <div class="spell-card">
        <div class="spell-card-inner">
          <p class="listen-prompt">👂 Listen carefully...</p>
          <button class="btn-speak" id="speak-btn" onclick="speakWord()">🔊 Hear the Word</button>
          <div class="hint-area" id="hint-area"></div>
        </div>
      </div>
      <div class="input-area">
        <input type="text" id="spell-input" class="spell-input" placeholder="Type the word here..."
               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn-check" onclick="checkAnswer()">Cast Spell ✨</button>
      </div>
      <div id="feedback" class="feedback hidden"></div>
      <button id="next-btn" class="btn-next hidden" onclick="nextWord()">Next Word →</button>
    </div>
    <div id="complete-area" class="hidden complete-area">
      <div class="complete-emoji">🏆</div>
      <h2>Practice Complete!</h2>
      <p id="complete-message"></p>
      <div class="complete-stats" id="complete-stats"></div>
      <div class="complete-buttons">
        <button onclick="startPractice()" class="btn btn-practice">Practice Again ✨</button>
        <a id="test-link" href="/test" class="btn btn-test">Take the Test ⭐</a>
      </div>
    </div>
  </div>
  <script>
    const childId = new URLSearchParams(location.search).get('child') || localStorage.getItem('spellcast_child_id');
    let words = [], queue = [], currentWord = null, correct = 0, total = 0, streak = 0;
    let listId = null;

    async function loadWords() {
      const res = await fetch(`/api/child/${childId}/active-list`);
      const list = await res.json();
      if (!list || !list.words.length) {
        document.getElementById('loading').textContent = 'No words yet! Ask your parent to add some. 🪄';
        return;
      }
      document.body.dataset.theme = list.child?.theme || 'purple';
      document.getElementById('test-link').href = `/test?child=${childId}`;
      words = list.words;
      listId = list.id;
      // Pre-warm audio for all words silently before starting
      if (listId) {
        words.filter(w => w.word).forEach(w => {
          const a = new Audio(`/api/audio/${listId}/${encodeURIComponent(w.word)}`);
          a.preload = 'auto';
        });
      }
      startPractice();
    }

    function buildWeightedQueue() {
      const q = [];
      for (const w of words) {
        const weight = 1 + Math.min(w.miss_count, 3);
        for (let i = 0; i < weight; i++) q.push(w);
      }
      for (let i = q.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [q[i], q[j]] = [q[j], q[i]];
      }
      return q;
    }

    function startPractice() {
      queue = buildWeightedQueue(); correct = 0; total = 0; streak = 0; updateStreak();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('complete-area').classList.add('hidden');
      document.getElementById('practice-area').classList.remove('hidden');
      nextWord();
    }

    function nextWord() {
      if (queue.length === 0) { showComplete(); return; }
      currentWord = queue.shift(); total++;
      updateProgress();
      document.getElementById('spell-input').value = '';
      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('hint-area').textContent = '';
      document.getElementById('spell-input').focus();
      document.getElementById('word-counter').textContent = `Word ${total} of ${queue.length + total}`;
      setTimeout(() => speakWord(), 300);
    }

    async function speakWord() {
      if (!currentWord) return;
      // Try OpenAI TTS first
      if (listId) {
        try {
          const audio = new Audio(`/api/audio/${listId}/${encodeURIComponent(currentWord.word)}`);
          audio.playbackRate = 1.0;
          await audio.play();
          return;
        } catch(e) { /* fall through to browser TTS */ }
      }
      // Browser TTS fallback
      const u = new SpeechSynthesisUtterance(currentWord.word);
      u.rate = 0.85; u.pitch = 1.1;
      speechSynthesis.speak(u);
    }

    function checkAnswer() {
      const raw = document.getElementById('spell-input').value.trim();
      if (!raw) return;
      const input = currentWord.requires_capital ? raw : raw.toLowerCase();
      const wordTarget = currentWord.requires_capital ? currentWord.word : currentWord.word.toLowerCase();
      const feedback = document.getElementById('feedback');
      const nextBtn = document.getElementById('next-btn');
      if (input === wordTarget) {
        correct++; streak++; updateStreak();
        feedback.className = 'feedback correct';
        feedback.innerHTML = getCorrectMessage() + ` <strong>${currentWord.word}</strong> ✅`;
        showConfetti();
      } else {
        streak = 0; updateStreak();
        feedback.className = 'feedback incorrect';
        feedback.innerHTML = `Almost! ❌<br><span style="font-size:2.5rem;font-weight:900;letter-spacing:0.05em;color:#fff;">${currentWord.word}</span><br><small style="opacity:0.6;">You wrote: "${raw}"</small>`;
        document.getElementById('hint-area').textContent = `📝 Study it: ${currentWord.word}`;
      }
      feedback.classList.remove('hidden');
      nextBtn.classList.remove('hidden');
    }

    function getCorrectMessage() {
      const msgs = ['Amazing!','Spectacular!','You\'re a wizard!','Brilliant!','Magical!','Perfect!'];
      return msgs[Math.floor(Math.random() * msgs.length)];
    }

    function updateStreak() { document.getElementById('streak').textContent = streak; }
    function updateProgress() {
      document.getElementById('progress-bar').style.width = ((total-1)/(queue.length+total))*100 + '%';
    }

    function showComplete() {
      document.getElementById('practice-area').classList.add('hidden');
      document.getElementById('complete-area').classList.remove('hidden');
      const pct = Math.round((correct/total)*100);
      document.getElementById('complete-message').textContent = pct===100?'🌟 Perfect! You\'re a SpellCast master!':pct>=80?'⭐ Great job!':'💪 Keep practicing!';
      document.getElementById('complete-stats').innerHTML = `Got <strong>${correct}</strong> out of <strong>${total}</strong> correct (${pct}%)`;
    }

    function showConfetti() {
      const emojis=['⭐','✨','🌟','🪄','💫'];
      for(let i=0;i<8;i++) {
        setTimeout(()=>{
          const el=document.createElement('div'); el.className='confetti-piece';
          el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
          el.style.left=Math.random()*100+'vw'; el.style.animationDuration=(Math.random()+0.5)+'s';
          document.body.appendChild(el); setTimeout(()=>el.remove(),2000);
        },i*80);
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key==='Enter') {
        if(!document.getElementById('next-btn').classList.contains('hidden')) nextWord();
        else checkAnswer();
      }
    });

    loadWords();
  </script>
</body>
</html>
