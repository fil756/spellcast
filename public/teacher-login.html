<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellCast – Teacher Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page" data-theme="purple">
  <div class="stars"></div>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">🎓</div>
      <h1 class="login-title">Teacher Portal</h1>

      <!-- PIN Login -->
      <div id="pin-area">
        <p class="login-subtitle">Select your name and enter your PIN</p>
        <form action="/teacher/login" method="POST">
          <div class="form-row">
            <select name="teacherId" id="teacher-select" class="login-input" style="appearance:auto;cursor:pointer;" required>
              <option value="">Loading...</option>
            </select>
          </div>
          <div class="form-row">
            <input type="password" name="pin" class="login-input" id="pin-input"
                   placeholder="Enter PIN" maxlength="20" autofocus
                   style="text-align:center;letter-spacing:0.3em;font-size:1.5rem;">
          </div>
          <div id="pin-error" class="login-error hidden">❌ Incorrect PIN. Try again.</div>
          <button type="submit" class="btn-login">Login 🔓</button>
        </form>
        <button onclick="showMagicLink()" class="forgot-pin-btn">Forgot PIN? Send me a magic link</button>
      </div>

      <!-- Magic Link Form -->
      <div id="magic-area" class="hidden">
        <p class="login-subtitle">Enter your email and we'll send you a sign-in link</p>
        <div class="form-row">
          <input type="email" id="magic-email" class="login-input" placeholder="your@email.com">
        </div>
        <div id="magic-error" class="login-error hidden"></div>
        <div id="magic-success" class="hidden" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:0.75rem;padding:1rem;text-align:center;color:#4ade80;margin-bottom:1rem;">
          📬 Check your email for a sign-in link!
        </div>
        <button onclick="sendMagicLink()" class="btn-login" id="magic-btn">✨ Send Magic Link</button>
        <button onclick="showPin()" class="forgot-pin-btn">← Back to PIN login</button>
      </div>

      <div style="margin-top:1.5rem;text-align:center;">
        <a href="/register" style="color:var(--accent);font-size:0.85rem;text-decoration:none;">New teacher? Create an account</a>
        &nbsp;·&nbsp;
        <a href="/" style="color:rgba(255,255,255,0.4);font-size:0.85rem;text-decoration:none;">← Back to SpellCast</a>
      </div>
    </div>
  </div>

  <script>
    async function loadTeachers() {
      const res = await fetch('/api/public/teachers');
      const teachers = await res.json();
      const select = document.getElementById('teacher-select');
      if (teachers.length === 0) {
        select.innerHTML = '<option value="">No accounts yet</option>';
      } else {
        select.innerHTML = teachers.map(t => `<option value="${t.id}">${t.name} — ${t.class_name}</option>`).join('');
      }
    }
    loadTeachers();

    const params = new URLSearchParams(location.search);
    if (params.get('error') === '1') document.getElementById('pin-error').classList.remove('hidden');
    if (params.get('error') === 'expired') {
      showMagicLink();
      document.getElementById('magic-error').textContent = '⏰ That link expired. Request a new one.';
      document.getElementById('magic-error').classList.remove('hidden');
    }

    function showMagicLink() {
      document.getElementById('pin-area').classList.add('hidden');
      document.getElementById('magic-area').classList.remove('hidden');
      document.getElementById('magic-email').focus();
    }
    function showPin() {
      document.getElementById('magic-area').classList.add('hidden');
      document.getElementById('pin-area').classList.remove('hidden');
      document.getElementById('pin-input').focus();
    }

    async function sendMagicLink() {
      const email = document.getElementById('magic-email').value.trim();
      const err = document.getElementById('magic-error');
      err.classList.add('hidden');
      if (!email || !email.includes('@')) {
        err.textContent = 'Please enter a valid email.';
        err.classList.remove('hidden');
        return;
      }
      const btn = document.getElementById('magic-btn');
      btn.textContent = '⏳ Sending...';
      btn.disabled = true;
      await fetch('/api/auth/magic-link', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, role: 'teacher' })
      });
      document.getElementById('magic-success').classList.remove('hidden');
      btn.textContent = '✅ Sent!';
    }
  </script>
</body>
</html>
